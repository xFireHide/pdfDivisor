<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Processador de PDF</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <h1>Processador de PDF</h1>
    <form id="uploadForm">
      <input type="file" id="file" name="file" accept=".pdf" required />
      <button type="submit">Processar PDF</button>
    </form>
    <div id="response"></div>

    <script>
      document
        .getElementById("uploadForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const fileInput = document.getElementById("file");
          const file = fileInput.files[0];
          const reader = new FileReader();

          reader.onload = async () => {
            const response = await fetch("/api.py", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                file_content: reader.result.split(",")[1],
              }),
            });

            if (response.ok) {
              const blob = await response.blob();
              const url = window.URL.createObjectURL(blob);
              const a = document.createElement("a");
              a.style.display = "none";
              a.href = url;
              a.download = "processed.pdf";
              document.body.appendChild(a);
              a.click();
              window.URL.revokeObjectURL(url);
            } else {
              const error = await response.text();
              document.getElementById("response").innerText = `Erro: ${error}`;
            }
          };

          reader.readAsDataURL(file);
        });
    </script>
  </body>
</html>
